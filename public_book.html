<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendamento — {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="fw-bold fs-5">{{ app_name }}</div>
      <div class="text-muted">Agendamento online (sujeito a aprovação)</div>
      <hr>
      <div class="row g-2">
        <div class="col-12 col-md-3">
          <label class="form-label small">Data</label>
          <input class="form-control" type="date" id="pbDay">
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small">Barbeiro</label>
          <select class="form-select" id="pbBarber"></select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small">Serviço</label>
          <select class="form-select" id="pbService"></select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small">Horário</label>
          <select class="form-select" id="pbTime"></select>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label small">Nome</label>
          <input class="form-control" id="pbName" placeholder="Seu nome">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label small">Telefone</label>
          <input class="form-control" id="pbPhone" placeholder="(opcional)">
        </div>
        <div class="col-12">
          <label class="form-label small">Observações</label>
          <textarea class="form-control" rows="2" id="pbNotes"></textarea>
        </div>
        <div class="col-12">
          <button class="btn btn-dark" id="pbSend">Solicitar agendamento</button>
        </div>
      </div>
      <div class="alert alert-success mt-3 d-none" id="pbOk">Pedido enviado! Aguarde aprovação.</div>
      <div class="alert alert-danger mt-3 d-none" id="pbErr"></div>
    </div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
function pad(n){return String(n).padStart(2,"0");}
async function api(path, opts){
  const res=await fetch(path, opts);
  const data=await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error(data.error || "Erro");
  return data;
}
function todayISO(){
  const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
async function loadBase(){
  $("pbDay").value = todayISO();
  const barbers=await api("/api/public/barbers");
  $("pbBarber").innerHTML = barbers.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
  const services=await api("/api/public/services");
  $("pbService").innerHTML = services.map(s=>`<option value="${s.name}">${s.name}${s.price!=null?` — R$ ${Number(s.price).toFixed(2)}`:""}</option>`).join("");
  await loadSlots();
}
async function loadSlots(){
  $("pbOk").classList.add("d-none");
  $("pbErr").classList.add("d-none");
  const day=$("pbDay").value;
  const barber_id=$("pbBarber").value;
  const service_name=$("pbService").value;
  const data=await api(`/api/public/slots?day=${encodeURIComponent(day)}&barber_id=${encodeURIComponent(barber_id)}&service_name=${encodeURIComponent(service_name)}`);
  $("pbTime").innerHTML = data.slots.length ? data.slots.map(t=>`<option>${t}</option>`).join("") : `<option value="">Sem horários</option>`;
}
async function send(){
  try{
    $("pbErr").classList.add("d-none");
    const payload={
      day:$("pbDay").value,
      time:$("pbTime").value,
      barber_id:Number($("pbBarber").value),
      service_name:$("pbService").value,
      client_name:$("pbName").value,
      client_phone:$("pbPhone").value,
      notes:$("pbNotes").value
    };
    await api("/api/public/book", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
    $("pbOk").classList.remove("d-none");
  }catch(e){
    $("pbErr").textContent=e.message;
    $("pbErr").classList.remove("d-none");
  }
}
$("pbDay").addEventListener("change", loadSlots);
$("pbBarber").addEventListener("change", loadSlots);
$("pbService").addEventListener("change", loadSlots);
$("pbSend").addEventListener("click", send);
loadBase();
</script>
</body>
</html>
