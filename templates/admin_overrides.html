{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-bold">Admin • Bloqueios por dia</div>
        <div class="small text-muted">Fechar o dia inteiro ou ajustar almoço em uma data específica.</div>
      </div>
      <a class="btn btn-outline-secondary btn-sm" href="/">Voltar</a>
    </div>
    <hr>
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label small">Data</label>
        <input class="form-control" type="date" id="ovDay">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label small">Fechado?</label>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="ovClosed">
          <label class="form-check-label small" for="ovClosed">Sim</label>
        </div>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label small">Almoço início</label>
        <input class="form-control" placeholder="13:00" id="ovLunchStart">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label small">Almoço fim</label>
        <input class="form-control" placeholder="14:00" id="ovLunchEnd">
      </div>
      <div class="col-12 col-md-3">
        <button class="btn btn-dark w-100" id="btnSaveOv">Salvar bloqueio</button>
      </div>
    </div>
    <div class="alert alert-danger mt-3 d-none" id="ovErr"></div>
    <hr>
    <div class="table-responsive">
      <table class="table table-sm align-middle" id="tblOv">
        <thead><tr><th>Data</th><th>Fechado</th><th>Almoço</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
