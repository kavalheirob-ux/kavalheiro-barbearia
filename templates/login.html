<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="fw-bold fs-5 mb-1">{{ app_name }}</div>
          <div class="text-muted small mb-3">Login do sistema</div>
          {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
          {% endif %}
          <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next or '/' }}">
            <div class="mb-2">
              <label class="form-label small">Usuário</label>
              <input class="form-control" name="username" placeholder="admin ou barbeiro2" required>
            </div>
            <div class="mb-3">
              <label class="form-label small">Senha</label>
              <input class="form-control" name="password" type="password" required>
            </div>
            <button class="btn btn-dark w-100">Entrar</button>
          </form>
          <hr>
          <div class="small text-muted">
            Padrão (troque depois):<br>
            <b>admin</b> / admin123<br>
            <b>barbeiro2</b> / barber123
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
