<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }} — Sistema</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#111827">
  <link rel="icon" href="/static/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">{{ app_name }}</a>
    <div class="d-flex align-items-center gap-2">
      {% if me %}
        <a class="btn btn-outline-light btn-sm" href="/profile/password">Minha senha</a>
        <span class="badge text-bg-secondary">{{ me.display_name }} • {{ me.role }}</span>
        <a class="btn btn-outline-light btn-sm" href="/logout">Sair</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid py-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js");
  }
</script>
</body>
</html>
