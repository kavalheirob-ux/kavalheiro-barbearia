{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="fw-bold">Minha senha</div>
        <div class="text-muted small">Troque sua senha com segurança.</div>
        <hr>
        {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
        {% if ok %}<div class="alert alert-success py-2">{{ ok }}</div>{% endif %}
        <form method="post">
          <div class="mb-2">
            <label class="form-label small">Senha atual</label>
            <input class="form-control" type="password" name="old_password" required>
          </div>
          <div class="mb-3">
            <label class="form-label small">Nova senha</label>
            <input class="form-control" type="password" name="new_password" required>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-dark">Salvar</button>
            <a class="btn btn-outline-secondary" href="/">Voltar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
