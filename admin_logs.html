{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-bold">Admin • Logs</div>
        <div class="small text-muted">Auditoria: quem criou/editou/aprovou/cancelou.</div>
      </div>
      <a class="btn btn-outline-secondary btn-sm" href="/">Voltar</a>
    </div>
    <hr>
    <button class="btn btn-dark btn-sm" id="btnLoadLogs">Atualizar</button>
    <div class="table-responsive mt-3">
      <table class="table table-sm align-middle" id="tblLogs">
        <thead><tr><th>Data/Hora</th><th>Ator</th><th>Ação</th><th>Entidade</th><th>ID</th><th>Detalhes</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
