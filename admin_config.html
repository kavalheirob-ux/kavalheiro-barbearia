{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-bold">Admin • Configurações</div>
        <div class="small text-muted">Horários padrão (o bloqueio por dia fica em “Bloqueios”).</div>
      </div>
      <a class="btn btn-outline-secondary btn-sm" href="/">Voltar</a>
    </div>
    <hr>
    <div class="row g-2">
      <div class="col-6"><label class="form-label small">Abertura</label><input class="form-control" id="open_time" placeholder="08:00"></div>
      <div class="col-6"><label class="form-label small">Fechamento</label><input class="form-control" id="close_time" placeholder="21:00"></div>
      <div class="col-6"><label class="form-label small">Slot (min)</label><input class="form-control" id="slot_min" placeholder="30" inputmode="numeric"></div>
      <div class="col-6"><label class="form-label small">Almoço (início)</label><input class="form-control" id="lunch_start" placeholder="13:00"></div>
      <div class="col-6"><label class="form-label small">Almoço (fim)</label><input class="form-control" id="lunch_end" placeholder="14:00"></div>
      <div class="col-12"><button class="btn btn-dark" id="btnSaveCfg">Salvar</button></div>
    </div>
    <div class="alert alert-success mt-3 d-none" id="cOk">Salvo!</div>
    <div class="alert alert-danger mt-3 d-none" id="cErr"></div>
  </div>
</div>
{% endblock %}
